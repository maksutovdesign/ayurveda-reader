<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1712"/>
  <!-- Decorative border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#7a5c2e" stroke-width="2" rx="12"/>
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#c9a96e" stroke-width="1" rx="8" opacity="0.4"/>

  <!-- Lotus ornament top -->
  <text x="600" y="120" text-anchor="middle" font-size="64" fill="#c9a96e" opacity="0.6">🌿</text>

  <!-- Main title -->
  <text x="600" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="62" fill="#e8dfc8" font-weight="bold">Классические самхиты</text>
  <text x="600" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="62" fill="#c9a96e" font-weight="bold">Аюрведы</text>

  <!-- Sanskrit -->
  <text x="600" y="380" text-anchor="middle" font-family="serif" font-size="32" fill="#7a5c2e" opacity="0.8">āyuḥ-kāmayamānena dharmārtha-sukha-sādhanam</text>

  <!-- Divider -->
  <line x1="300" y1="415" x2="900" y2="415" stroke="#7a5c2e" stroke-width="1" opacity="0.6"/>

